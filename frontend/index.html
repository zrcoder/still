<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="文头字脑 - 一个关于文字的诗意游戏">
    <title>文头字脑</title>

    <link rel="stylesheet" href="./src/assets/fonts/fonts.css">
    <link rel="stylesheet" href="./src/style.css">
</head>

<body>
    <div class="game-wrap">
        <header class="game-header">
            <h1 class="game-header__title">文头字脑</h1>
            <p class="game-header__subtitle">犹"针头线脑"，不值钱的小东西，以少即是多的魔力给人光亮。</p>
        </header>

        <main id="scene"></main>
        <div id="fragments-layer"></div>

        <aside id="collection-sidebar">
            <div class="sidebar-actions">
                <button id="mute-btn" aria-label="静音">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                </button>
                <button id="restart-btn" aria-label="重新开始">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 .49-3.9"></path>
                    </svg>
                </button>
            </div>
        </aside>

        <div class="bottom-panels">
            <section id="narrative">
                <h2>故事</h2>
                <div id="narrative-content">
                    <p class="placeholder">……</p>
                </div>
            </section>

            <section id="creation">
                <h2>创作</h2>
                <div class="creation-form">
                    <div id="player-text" class="creation-editor" contenteditable="true" data-placeholder="落笔……"></div>
                    <div class="creation-form__actions">
                        <span id="char-count">0/100</span>
                        <div class="creation-form__right">
                            <label for="player-image">上传图片</label>
                            <input type="file" id="player-image" accept="image/jpeg,image/png,image/gif,image/webp">
                            <button id="submit-text">完成</button>
                        </div>
                    </div>
                </div>
                <div id="creation-scroll">
                    <div id="collection">
                    </div>
                    <button id="load-more-creations" class="load-more-btn">加载更多</button>
                </div>
            </section>
        </div>

        <div class="fragment-overlay">
            <div class="fragment-detail">
                <button class="fragment-detail__close" aria-label="关闭">×</button>
                <div class="fragment-detail__text"></div>
                <div class="fragment-detail__context"></div>
                <button id="collect-btn">收集</button>
            </div>
        </div>

    </div>

    <div id="restart-overlay" class="fragment-overlay">
        <div class="fragment-detail">
            <div class="fragment-detail__text">确定重新开始？</div>
            <div class="fragment-detail__context">所有创作将消失。</div>
            <div class="restart-actions">
                <button id="restart-confirm">确定</button>
                <button id="restart-cancel">取消</button>
            </div>
        </div>
    </div>

    <script src="./src/main.ts" type="module"></script>
</body>

</html>
