name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: '文头字脑'
            platform: 'darwin/universal'
            os: 'macos-latest'
          - name: '文头字脑'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - name: '文头字脑'
            platform: 'windows/amd64'
            os: 'windows-latest'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wails
        uses: dAppServer/wails-build-action@v2
        with:
          build-name: ${{ matrix.name }}
          build-platform: ${{ matrix.platform }}
          go-version: '1.26'
          node-version: '20'
          package: true
          nsis: true
