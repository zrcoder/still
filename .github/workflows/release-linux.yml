name: Release Linux

on:
  release:
    types: [published]

jobs:
  release-linux:
    name: Release Linux App
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build wails app for Linux
        run: |
          CGO_ENABLED=1 wails build -platform linux/amd64

      - name: Compress binary
        working-directory: ./build/bin
        shell: bash
        run: tar -czvf still-linux-amd64.tar.gz still

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: build/bin/still-linux-amd64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
